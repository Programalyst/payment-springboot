spring.application.name=demo-processor
server.port=8081
spring.threads.virtual.enabled=true
spring.kafka.bootstrap-servers=localhost:9092
app.kafka.payment-topic=payment-topic
app.kafka.payment-topic-retention-ms=86400000

# Quiets down Spark and Hadoop's internal engine logging noise globally
logging.level.org.apache.spark=WARN
logging.level.org.apache.hadoop=WARN
logging.level.org.sparkproject=WARN